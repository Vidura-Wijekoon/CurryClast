version: "3.9"

services:
  api:
    build: .
    container_name: currycast-api
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./data:/app/data
    command: ["uvicorn", "src.api.service:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build: ./frontend
    container_name: currycast-frontend
    ports: ["8080:80"]
    depends_on: [api]
